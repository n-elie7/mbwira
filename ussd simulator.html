<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mbwira USSD Simulator</title>

    </head>
    <body>
        <div class="header">
            <h1>Mbwira USSD Simulator</h1>
            <p>Gerageza Mbwira nk'aho uri telefone ya feature phone.<br>Simulate Mbwira as if dialing from any basic phone</p>

        </div>
        <div class="layout">
            <div>
                <div class="phone-frame">
                    <div class="phone-speaker"></div>
                    <div class="phone-screen" id="screen">
                        <div class="status"><span>MTN RW</span><span>📶 🔋</span></div>
                        <div class="content" id="screenContent">Press *384*69699# SEND to start</div>
                        <div class="input-area"><span id="inputDisplay">_</span><span>OPTIONS</span></div>
                    </div>
                    <div class="phone-frame">
                        <button class="key" data-k="1">1</button>
                        <button class="key" data-k="2">2</button>
                        <button class="key" data-k="3">3</button>
                        <button class="key" data-k="4">4</button>
                        <button class="key" data-k="5">5</button>
                        <button class="key" data-k="6">6</button>
                        <button class="key" data-k="7">7</button>
                        <button class="key" data-k="8">8</button>
                        <button class="key" data-k="9">9</button>
                        <button class="key start" data-k="*">*</button>
                        <button class="key" data-k="0">0</button>
                        <button class="key hash" data-k="#">#</button>
                        <button class="key send" data-k="sendBtn">SEND</button>
                        <button class="key" data-k="7">-</button>
                        <button class="key clear" id="clearBtn">CLR</button>
                    </div>
            </div>

        </div>
        
    </body>
</html>
