<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mbwira — Counselor Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Manrope:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="counselor.css">
</head>

<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Counselor Dashboard</h1>
    <p>Enter your dashboard password to view pending escalations.</p>
    <input type="password" id="pwd" placeholder="Password" autocomplete="off" />
    <button id="loginBtn">Enter</button>
  </div>
  
</div>

<div class="main" id="main">
  <div class="topbar">
    <div class="brand">mb<span>wira</span> · counselor</div>
    <div style="font-size:0.85rem;opacity:0.7" id="tsNow"></div>
  </div>

  <div class="content">
    <div class="stats" id="stats"></div>
    <h2>Pending escalations</h2>
    <div id="escalationList"></div>
  </div>

</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <h3>Session details</h3>
      <button id="closeModal">×</button>
    </div>

    <div class="modal-body" id="modalBody"></div>
    <div class="callback-section" id="callbackSection" style="
      padding: 1.5rem 2rem;
      border-top: 1px solid rgba(45,61,46,0.1);
      background: rgba(195,90,78,0.05);
    ">
      <h4 style="font-family: 'Fraunces', serif; font-size: 1.1rem; margin-bottom: 0.8rem;">
        Reach the user
      </h4>

      <div id="contactInfo" style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--muted);">
        Loading contact options...
      </div>

      <div id="revealedNumber" style="
        display: none;
        padding: 0.8rem 1rem;
        background: var(--forest);
        color: var(--cream);
        border-radius: 4px;
        margin-bottom: 1rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.05rem;
      "></div>

      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
        <button id="revealBtn" style="
          padding: 0.6rem 1rem; background: var(--clay); color: white;
          border: none; border-radius: 4px; cursor: pointer; font-family: inherit;
          font-size: 0.9rem;
        ">📞 Reveal number to call</button>
        <button id="sendWhatsappBtn" style="
          padding: 0.6rem 1rem; background: #25D366; color: white;
          border: none; border-radius: 4px; cursor: pointer; font-family: inherit;
          font-size: 0.9rem;
        ">💬 Send WhatsApp reply</button>
      </div>

      <div id="outboundArea" style="display: none; margin-top: 1rem;">
        <textarea id="outboundText" placeholder="Type a message to send the user on WhatsApp..." style="
          width: 100%; padding: 0.8rem; border: 1px solid rgba(45,61,46,0.2);
          border-radius: 4px; font-family: inherit; min-height: 80px; resize: vertical;
          margin-bottom: 0.5rem;
        "></textarea>
        <button id="outboundSendBtn" style="
          padding: 0.6rem 1rem; background: #25D366; color: white;
          border: none; border-radius: 4px; cursor: pointer; font-family: inherit;
          font-size: 0.9rem; font-weight: 600;
        ">Send</button>
      </div>

    </div>

    <div class="resolve-section">
      <textarea id="resolveNotes" placeholder="Resolution notes (what did you do / how did you reach the user)..."></textarea>
      <button id="resolveBtn">Mark resolved</button>
    </div>

  </div>

</div>
<script src="counselor.js"></script>
</body>
</html>
