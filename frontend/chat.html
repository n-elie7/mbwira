<!DOCTYPE html>
<html lang="rw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mbwira — Ikiganiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --clay: #C35A4E; --forest: #2D3D2E; --forest-dark: #1C271D;
    --cream: #F7F1E8; --cream-warm: #EFE5D2; --sand: #E8DDC8;
    --ink: #1A1A1A; --muted: #6B6258;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .app-header {
    padding: 1.25rem 1.5rem;
    background: var(--cream);
    border-bottom: 1px solid rgba(45,61,46,0.1);
    display: flex; justify-content: space-between; align-items: center;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.3rem;
  }
  .logo span { color: var(--clay); }
  .privacy-pill {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--forest);
    padding: 0.3rem 0.7rem;
    background: var(--cream-warm);
    border-radius: 100px;
  }
  .privacy-pill::before {
    content: "●";
    color: #4CAF50;
    margin-right: 0.4rem;
  }
  .chat-container {
    flex: 1;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    display: flex; flex-direction: column;
    padding: 1rem;
  }
  .intro {
    text-align: center;
    padding: 3rem 1rem 2rem;
  }
  .intro h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
  }
  .intro p { color: var(--muted); font-size: 0.95rem; }
  .lang-switch {
    display: inline-flex;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding: 0.3rem;
    background: var(--cream-warm);
    border-radius: 100px;
  }
  .lang-switch button {
    padding: 0.4rem 1rem;
    background: transparent;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .lang-switch button.active {
    background: var(--forest);
    color: var(--cream);
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 0;
    display: flex; flex-direction: column; gap: 0.8rem;
  }
  .msg {
    max-width: 78%;
    padding: 0.9rem 1.1rem;
    border-radius: 14px;
    font-size: 0.97rem;
    line-height: 1.5;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } }
  .msg.user {
    align-self: flex-end;
    background: var(--forest);
    color: var(--cream);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #fff;
    border: 1px solid rgba(45,61,46,0.12);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: var(--clay);
    color: var(--cream);
    font-size: 0.85rem;
    max-width: 90%;
    text-align: center;
  }
  .msg.typing {
    color: var(--muted);
    font-style: italic;
    background: transparent;
    border: none;
  }
  .msg-content { white-space: pre-wrap; }
  .escalation-banner {
    margin: 0.5rem 0;
    padding: 0.8rem 1rem;
    background: rgba(195,90,78,0.1);
    border-left: 3px solid var(--clay);
    border-radius: 4px;
    font-size: 0.88rem;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
    padding: 1rem 0 1.5rem;
    position: sticky;
    bottom: 0;
    background: var(--cream);
  }
  .input-row input {
    flex: 1;
    padding: 0.95rem 1.2rem;
    border: 1px solid rgba(45,61,46,0.2);
    border-radius: 100px;
    background: #fff;
    font-family: inherit;
    font-size: 0.97rem;
    outline: none;
  }
  .input-row input:focus { border-color: var(--forest); }
  .input-row button {
    padding: 0.95rem 1.5rem;
    background: var(--forest);
    color: var(--cream);
    border: none;
    border-radius: 100px;
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
  }
  .input-row button:disabled {
    opacity: 0.5; cursor: not-allowed;
  }
  .starters {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    justify-content: center; margin-top: 1.5rem;
  }
  .starter {
    padding: 0.6rem 1rem;
    background: #fff;
    border: 1px solid rgba(45,61,46,0.15);
    border-radius: 100px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .starter:hover { background: var(--cream-warm); border-color: var(--forest); }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">mb<span>wira</span>.</div>
  <div class="privacy-pill" id="privacy">Ibanga ryawe rirarinzwe</div>
</header>

<div class="chat-container">
  <div class="intro" id="intro">
    <h1 id="intro-title">Turimo kumva. Bwira Mbwira.</h1>
    <p id="intro-sub">Ntabwo dusaba izina ryawe. Nta muntu uzi ko uri hano.</p>
    <div class="lang-switch">
      <button class="active" data-lang="rw">Kinyarwanda</button>
      <button data-lang="en">English</button>
    </div>
    <div class="starters" id="starters">
      <!-- populated by JS -->
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <input id="input" type="text" placeholder="Andika hano..." autocomplete="off" />
    <button id="send">Ohereza</button>
  </div>
</div>

<script>
const API_BASE = "";
let sessionId = null;
let language = "rw";

const strings = {
  rw: {
    title: "Turimo kumva. Bwira Mbwira.",
    sub: "Ntabwo dusaba izina ryawe. Nta muntu uzi ko uri hano.",
    placeholder: "Andika hano...",
    send: "Ohereza",
    privacy: "Ibanga ryawe rirarinzwe",
    typing: "Mbwira arimo kwandika...",
    starters: [
      "Natinye kubwira umuntu ikibazo...",
      "Ndashaka kumenya iby'ubuzima bw'imyororokere",
      "Sinsinzira neza",
      "Nkeneye umujyanama"
    ],
    escalation: "Umujyanama azaguhamagara mu masaha 24."
  },
  en: {
    title: "We're listening. Tell Mbwira.",
    sub: "We don't ask for your name. No one knows you're here.",
    placeholder: "Type here...",
    send: "Send",
    privacy: "Your chat is private",
    typing: "Mbwira is writing...",
    starters: [
      "I'm scared to tell someone...",
      "I want to know about contraception",
      "I can't sleep well",
      "I need a counselor"
    ],
    escalation: "A counselor will call you within 24 hours."
  }
};

async function newSession() {
  const res = await fetch(`${API_BASE}/chat/new`);
  const data = await res.json();
  sessionId = data.session_id;
}

function addMessage(role, content, extraClass = "") {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role} ${extraClass}`;
  const inner = document.createElement("div");
  inner.className = "msg-content";
  inner.textContent = content;
  div.appendChild(inner);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendMessage(text) {
  if (!text.trim()) return;
  const intro = document.getElementById("intro");
  intro.style.display = "none";
  addMessage("user", text);
  document.getElementById("input").value = "";
  const sendBtn = document.getElementById("send");
  sendBtn.disabled = true;

  const typingEl = addMessage("assistant", strings[language].typing, "typing");

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId, message: text, language })
    });
    const data = await res.json();
    typingEl.remove();
    addMessage("assistant", data.reply);
    if (data.escalated) {
      const banner = document.createElement("div");
      banner.className = "escalation-banner";
      banner.textContent = `✓ ${strings[language].escalation} (${data.escalation_reason})`;
      document.getElementById("messages").appendChild(banner);
    }
  } catch (err) {
    typingEl.textContent = "Error: " + err.message;
  }
  sendBtn.disabled = false;
  document.getElementById("input").focus();
}

function renderStarters() {
  const el = document.getElementById("starters");
  el.innerHTML = "";
  strings[language].starters.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "starter";
    btn.textContent = s;
    btn.onclick = () => sendMessage(s);
    el.appendChild(btn);
  });
}

function applyLanguage(lang) {
  language = lang;
  const s = strings[lang];
  document.getElementById("intro-title").textContent = s.title;
  document.getElementById("intro-sub").textContent = s.sub;
  document.getElementById("input").placeholder = s.placeholder;
  document.getElementById("send").textContent = s.send;
  document.getElementById("privacy").textContent = s.privacy;
  document.querySelectorAll(".lang-switch button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === lang);
  });
  renderStarters();
}

document.querySelectorAll(".lang-switch button").forEach(btn => {
  btn.onclick = () => applyLanguage(btn.dataset.lang);
});

document.getElementById("send").onclick = () => {
  sendMessage(document.getElementById("input").value);
};
document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage(e.target.value);
});

// init
newSession();
applyLanguage("rw");
</script>
</body>
</html>
