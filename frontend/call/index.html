<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mbwira | Video call</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="call-header">
        <div class="logo">mb<span>wira</span>.</div>
        <div class="privacy-pill" id="privacyPill">Ikiganiro ni ibanga</div>
    </header>

    <div class="stage">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localvideo" autoplay playsinline muted></video>
        <div class="status-overlay" id="statusOverlay">
            <div class="pulse"></div>
            <h2 id=statusTitle>...</h2>
            <p id="statusSub"></p>
        </div>
    </div>
</body>
</html>
