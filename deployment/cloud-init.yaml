#cloud-config
package_update: true
package_upgrade: true

users:
  - name: deploy
    groups: docker, sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ssh-rsa  mac@MacBook-Pro.local

packages:
  - ufw
  - fail2ban
  - curl

runcmd:
  # install Docker
  - curl -fsSL https://get.docker.com | sh
  - apt-get install -y docker-compose-plugin

  # Firewall: only SSH, HTTP, HTTPS
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # App directory
  - mkdir -p /opt/mbwira
  - chown deploy:deploy /opt/mbwira

  # Harden SSH: disable root login and password auth
  - sed -i 's/^#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart ssh

final_message: "Mbwira droplet ready after $UPTIME seconds"
